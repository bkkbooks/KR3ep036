body:
  text: 正文丁丑九月方子嚴觀察哲嗣仲侯於鳳陽試寓病甚劇時予客邗上觀察招予往治之於月之二十二日起行二十六日抵鳳與仲侯朝夕診治閱一月始獲起坐茲將顛未錄記於後九月二十六日診得脈來如弦灼熱無汗午後尤甚面上浮腫色青黃鼻黑暗口苦而渴時作咳嗽痰色青白有沫如珠口內流涎舌苔滑膩前半色白後半灰黑唇口焦裂神氣昏沉日夜寤而不寐是內伏秋燥之氣外受冷露之寒病延兩旬燥氣化熱表裡未能通達邪氣深入灼熱日多陰液所存無幾漸至內陷證屬險危非喻氏逆流挽舟法恐難奏效以四逆散合增液湯加減若能得汗方是佳兆柴胡鮮生地釵石斛大棗冬元參枳實牡丹皮天花粉金銀花二十八日前師喻氏之意參以救液化熱渾身透汗其灼熱雖未退盡而表裡業已通達由午睡至申始醒神氣安寧大有轉機之象經云夏傷於暑秋必瘧痢察病情邪已深入將來恐有瘧痢仍宗前法以枳實易茯苓引鬱蒸之熱從小便而出方為合法柴胡鮮生地大棗冬元參茯苓牡丹皮天花粉金銀花二十九日病由前延兩醫用藥夾雜苦寒過分陰寒之性凝結下焦日夜腸鳴幽幽如走水之狀若燥糞下行早伏便溏泄瀉之機今灼熱已退神氣清爽肌膚潮潤身汗常有能不慮及傷陽之條恐里陽衰乏陰盛生寒真陽飛越亟須鎮攝免至臨時棘手譬如劍閣若據而陰平非復漢有也非真武湯不能勝任熟附子炒白芍白朮白茯苓炙甘草十月初一日昨服真武湯口中不幹不渴心中不煩不躁咳嗽流涎面浮尚未見松乃宗前法加茯苓一錢熟附子炒白芍白茯苓炒白朮炙甘草初二日真武湯連服兩劑兼以豬膽蜂蜜導入穀道夜半下燥糞甚多脈靜身涼稀粥稍進口中流涎作苦灰黑之苔已轉白膩而滑矣面上浮腫喉癢咳嗽痰吐不出色青如膠白沫如珠尚未鬆動內伏秋燥之氣已化外受冷露之寒未宣遏塞肺竅若不早除愈後恐成痰飲致有咳嗽氣喘之疾惟小青龍湯能直入病所適達肺竅非此方不為功麻黃細辛桂枝乾薑半夏五味子白芍初三日昨服小青龍湯喉癢咳嗽痰吐白沫皆松大便又行予思病久則虛有先補而後攻者有先攻而後補者不可執定成規氣體本虛而病已一月不妨先固真原待氣分稍充再行攻伐未嘗不可八珍湯去熟地加陳姜耆潞黨參茯神炮姜川芎白芍炙黃耆當歸於朮炙甘草大棗生薑陳皮初四日昨服八珍湯夜間出軟糞甚多天明時又下糞水一次真原稍復能食薄粥少許但咳嗽稍定痰未活動仍用小青龍湯服後再議麻黃細辛桂枝乾薑白芍半夏五味初五日服小青龍湯痰已活動白沫亦無面上浮腫盡消然經方能直入巢穴只能暫用連日已行燥糞三次又見稀糞上中下三焦皆屬空虛胃氣未開薄粥仍然少許宜溫補脾腎氣血為法炙黃耆潞黨參炒白朮白茯神破故紙縮砂仁炮薑炭熟附子全當歸大川芎炙甘草大棗生薑初六日自邪熱一退即用真武湯繼用溫補脾腎不料燥糞出盡一夜連瀉稀水三次病後泄瀉滯下用藥更難閱方徐二君之法大黃連用十日不但大便未通反將陰寒之氣結聚腹中以致日夜腸鳴幽幽如走水狀仍宗前法加溫暖腸胃之品煨肉果吳茱萸熟附子炮薑炭白茯神炒白朮炙黃耆潞黨參破故紙炙甘草初七日兩手關脈見弦陰陽不和夜半大便易於受涼時將未初驟然寒熱兩時汗出直至足底被褥皆濕夜半又下軟糞一次竊思病後汗多恐陽氣衰微擬參附湯以扶陽固氣予謂治病難而養病亦不易也潞黨參熟附子初八日連日寅刻大便起坐床上天尚未明而寒氣更甚又泄瀉三次體虛之人焉能不受寒涼隨看兩手關脈弦而有力是虛瘧來派幸而寒熱時候不大只胸腹時覺膨脹小便混濁黃色以補中益氣湯升清降濁待瘧疾轉正再議潞黨參升麻柴胡陳皮當歸炙黃耆於朮炙草生薑大棗白茯苓初九日脈弦不平陰陽未調已轉間日瘧疾先寒後熱約兩時許熱退汗收被褥全行汗濕而手指冰冷特恐汗多亡陽幸喜泄瀉已止寒漸化熱日夜食稀粥湯數次惜無人參調補只好重用黨參以代之兼固陽氣庶將來病愈後真元易於充復參附湯主之潞黨參熟附子初十日瘧不當期脾腹時覺膨脹小便混濁余皆平安以小柴胡湯輕劑直入少陽以探病機佐豬苓以分清濁柴胡半夏黃芩黨參炙草豬苓生薑大棗十一日瘧來已早兩時寒去熱退汗止似乎稍松記日來已三次汗多屢潮被褥指尖不冷只覺胸腹膨脹而響小便混濁精神疲睏而已獨參湯主之潞黨參十二日瘧不當期余皆平安如果來日再至恐病久汗大難以支持仍用少陽經重劑加猛藥直入巢穴所謂不入虎穴焉得虎子若不即除延久恐難制伏柴胡黨參枯芩常山花粉半夏豬苓知母甘草生薑大棗十二日昨用猛藥欲是行險僥倖而瘧疾竟除一大快事也今仍以獨參湯主之潞黨參十四日精神漸復薄粥頻添惟胸腹膨脹小便混濁渾身作癢此汗出潮濕所致無礙也從此小心調理指日可以痊愈五苓散主之炒白朮豬苓澤瀉茯苓肉桂心十五日小便混濁業已分清大便如常並無虛熱潮熱等證只有胸腹膨脹時響經云飲食後作脹其脹在腸胃不飲食亦脹而響其脹在脾水氣結聚脾為所困經所謂脹滿之證也宗景岳人參四磨飲合五皮飲加減大腹皮真陳皮茯苓皮制川樸老蘇梗潞黨參十七日腹脹已松仍宗前法大腹皮真陳皮制川樸茯苓皮潞黨參老蘇梗炒枳殼十九日腹中膨脹已消惟飲食下咽下氣上逆泄氣而消揣其病情是清濁之氣升降失和耳現兩足軟弱步履維艱仍宜睡養切勿勉強致生別端仿七氣湯熟半夏制川樸白茯苓紫蘇葉玫瑰花鮮生薑二十七日睡亦安寧二便如常且素患內痔便後有血或有或無近食麵飯頗有滋味兩足仍然軟弱再用調補之劑五十日即可復原予細查前方不覺心膽驚悸始知死裡逃生之病仲侯受之而用出奇行險之方予一心主之藥到病除者有神助焉回憶乙亥冬揚州太守英公病亦危險予一藥而除七年之疾仲侯與英公病雖不同其事則一也予並志之黨參萸肉茯神枸杞山藥蓯蓉炙草棗仁十一月十五日予切脈幼得太素之傳仲侯品格清高容止謙順將來福澤未可限量惟大病甫痊精氣未復務當慎風寒節飲食則天地六淫之氣自然不侵於內予自十月二十八日由鳳回邗仲侯半月以來連下宿糞大小百餘枚惟日間多坐夜間兩足微腫虛汗頻有大便間或有血是水寒土濕木鬱風動之故當補火燥土暖血溫肝即痔血亦以此法通之炒於朮大生地炒黃芩清阿膠熟附子炙甘草老桂枝鮮扁柏灶心土辛巳夏四月中浣武少尉巨川方駕部伯融來寓出方子嚴觀察專信見示始知觀察喆嗣揖趙患證屬余醫治余恐才識不逮托其善為我辭是晚二次信至詞意諄切實難再卻當料理行裝次早乘輿赴八寶即夕至高郵輿人困乏遂易舟乘順風夜行十九日午初抵觀察寓診視揖趙之病熱將內陷危險之至先進紫雪丹驅其熱繼以犀角地黃湯救其陰周身汗出其熱解去於是專用育陰法舌苔回津又用導法燥糞兩下胃開神靜惟右手經絡為濕邪所竄致軟弱不便本古賢治痿弱獨取陽明法始獲轉運自如旁觀謂余是岐黃神手余曰命也非人力所至既承觀察信任自不能不竭盡心力用副見委茲將所開脈案藥方鈔錄一帙冀同道君子正之並書數語以志顛末四月十九日病已十餘日未曾微汗以致外溫內灼舌苔乾而焦短而硬直如黑鐵且牙關漸緊言語不清口內氣味腥臭薰人臥床不能轉側神氣昏滯是熱熾而邪逼入陰中蓋陽津陰液均已乾涸汗自不能外達內陷顯然危險之至用紫雪丹單刀直破堅壘繼以犀角地黃湯去熱存陰若得微汗則吉紫雪丹犀角鮮生地丹皮生甘草本方去白芍添甘草二十日昨診兩寸關脈如弦舌短硬其苔乾黑邊底光紅如鏡唇破口臭牙緊言語不清頭熱而手足心胸腹按之尤覺火灼睡覺不沉神氣昏滯腸胃津液皆為邪熱耗頓以致肌膚如鱗病已十三日曾未出汗邪氣從何而走當進紫雪丹犀角地黃湯夜間甫得渾身微汗僅至大腿脈自稍平肌膚漸通舌尖光紅轉淡但津液未回所飲湯水皆要熱服經所謂內熱極則外自生寒也前方加重添生白芍麥冬前方犀角地黃湯加重加白芍麥冬二十一日昨服原方加白芍麥冬汗出至腿身熱已解六七牙關能開舌硬漸軟稍能伸縮神氣清楚口內腥臭之味亦退八九但臥床難動舌黑乾燥尚未有效是悶遏之邪化火猶未能由汗而退也原方加元參以育陰氣閱吳先生一方思古人設白虎湯系直入陽明藥到病除須作渴時飲灼熱汗出方能進之性命攸關寧可弗藥此次內熱延燒頗劇已成內陷之象經云熱極則風動胃爛則吐紅水則此時候雖神仙亦無可如何矣救熱存陰轉危為安夭也非餘力也原方加元參二十二日連進前方加元參麥冬身上手足心之熱退清渾身有汗仍未到足緣陰為汗源亦藉陽為鼓盪足有三陰三陽今熱傷陰液致三陽之氣亦失其權故未達到也現在黑苔全退舌尖能伸能縮紅漸轉淡至今津液未回可見熱極將陰分燒損非重育陰氣恐難勝任去鮮生地易大生地停紫雪丹二十三日昨進育陰重劑始能脈靜身和眠安便濁惟燥糞凝結腹中舌條仍然乾燥自十九日起二十三日止津液尚未得回可見水為火涸今日始見瘦容仿增液湯加以淡滲之品引熱邪從小腸而出非此不為功也細生地元參銀花茯苓大麥冬滑石二十四日昨進增液湯佐以淡滲小便晝清夜濁舌條中間乾燥紅色花開邊底皆有潮潤之意右手筋脈軟痿不能運動似乎作酸是邪化火逼入經絡仍宗前法方能內液充復則舌上自然生津矣細生地茯苓滑石麥冬銀花元參燈草二十五日連進增液舌上潮潤現在根生白苔舌尖尚紅至右手痠軟難動俟燥糞已行後再行料理仍服原方去滑石加知母二十六日連進原方今日周身潮潤舌上白苔生滿小便清利可見雲行雨施萬物皆生矣惟舌尖尚紅燥糞未下此係大腸津液未復仍宗前法麥冬大生地知母銀花元參茯苓二十七日舌上潮潤舌尖仍紅口唇乾燥皆因燥糞雖動部位未得下行結而生火仿養陰兼以潤腸軟堅為法大生地元明粉知母麻仁元參茯苓川黃柏二十八日進潤腸之法腹中燥糞下至小腹舌上潮潤前半截稍干咳嗽一二聲吐出稠痰一口似乎上焦肺氣已舒惟胃氣未蘇苔能燥糞下行營衛流通矣今去其軟堅專以潤腸為法大生地郁李仁知母蘇子麻仁杏仁元參柏子仁天門冬二十九日停藥三十日腹中作脹更衣不得萬分焦慮擬以豬膽導法商之於余余曰可如法治之下黑糞三十餘粒病者頓覺身輕也五月初一日昨用導法燥糞立下舌上津回舌尖之苔未生頭痛身微熱汗出直至足底余垢未盡仿參麥合滋燥法當參麥冬白芍花粉生地知母丹皮初二日停藥初三日燥糞下從頭上輕按則熱重重按則熱輕口中作燥渾身皆然兩太陽疼前用甘寒之品得汗而身熱退清現熱又起午後尤甚溯進甘寒已十一日但未經汗下之身熱與已經汗下之身熱大有虛實之別不能再追甘寒恐有金寒水冷作嗽傷脾敗胃等證思維至再經文有甘溫能退大熱一條茲擬早服補中益氣晚服地黃湯以滋腎水嫩黃耆黨參柴胡升麻白朮茯苓陳皮熟地萸肉懷山藥丹皮澤瀉初四日昨進補中益氣湯並地黃湯面上暗色開爽身上潮熱解去大半稀粥漸增舌條尚有些作於此皆元氣未復宗前方加麥冬藥加重端陽日停藥初六日初三四進補中益氣兼以六味虛熱退清又用導法下燥糞極多惟病久則虛仿八珍湯加黃耆雙補氣血至右手不能懸候氣血充復再行專治黃耆黨參於朮茯苓炙草熟地川芎當歸白芍生薑大棗初七日昨進八珍加耆營衛之氣稍和照服原方藥味加重初八日八珍加黃耆服後胃氣已蘇稠粥加倍右手骨節捏之知痛肩臂手指均覺痠麻經云四肢為諸陽之本邪氣客於經絡之中陽氣內衰不能榮養筋脈若不及早治則日久必延蔓為患為虺勿摧為蛇將若何宗前方雙固氣血加附子以通其陽桑枝以引入手臂川芎當歸白芍熟地黨參於朮雲茯苓炙甘草製附子桑枝初九日照服原方初十日初八九兩日八珍加附子桑枝右手掌指能動能捏並知痛癢營氣已和忽又頭疼發熱舌上作干此陽通濕動之象也病已四十餘日真原虛極非附子不能扶助陰陽以通經絡至於虛熱潮熱盜汗日汗不寐浮腫病後常有不足為慮仿補中益氣加蔓荊子以升清降濁黃耆黨參升麻柴胡茯苓白朮陳皮炙草蔓荊子生薑大棗十一日昨服補中益氣身熱雖增小便清利舌苔前半微干後半潮潤色黃是營氣自和衛氣未和手臂頗覺酸癢此是伏邪欲出不得之象仿小柴胡湯從少陽以樞轉其邪仍從太陽外達由汗而出其熱自清而手臂背肩亦可藉此活動矣柴胡黃芩黨參白芍花粉甘草生薑大棗十二日三十初六兩日燥糞下盡進八珍湯雙補氣血右手掌指稍能伸縮細思初病頭疼背板病從太陽而入太陽本屬寒水之經行身之背聞問日久始悉前因病重熱甚用燒酒濕紙貼胸意在拔出火邪詎知火未引出而邪氣已竄入太陽經絡是夜右手脈息忽伏兩三刻方起因此軟弱也當於初八初九兩日加附子共一分五釐服後熱甚似乎經絡中之邪為附子衝動十一日又進小柴胡湯以樞轉其邪從太陽外達汗出一身其熱解去八珍加附子小柴胡湯相為掎角奪門革鼎各有專功膽怯焉能建補天浴日之功仍宗前法減輕柴胡和解表裡為法十三日診得脈息平靜虛熱退清身常帶汗胃氣日健小便清利是臟腑之病均無矣惟右手不能懸起其病全在經絡專以扶正化濕治之黃耆黨參釵斛花粉丹皮白芍甘草十四日大病愈後未能在床靠臥右手肘腕尚不能懸緣陽明濕熱薰蒸於肺而屢元氣已復即當治痿獨取陽明背肩臂手自愈此治本之道仿千金清源法嫩黃耆沙參天冬麥冬於朮花粉苡米粉草十五日脈靜神安仿古賢獨取陽明法以治右手嫩黃耆黨參麥冬天冬茯神懷藥釵斛粉草桑枝苡米生於術十六日昨以專治陽明法據病者云渾身覺得安泰之至右手筋絡較前數日更知痠痛照服原方可也十七日右手臂指已能活動惟背肩軟弱靠坐尚難此熱邪竄入經絡之患古賢治痿弱要旨在取陽明以陽明主宗筋束骨通利機關仿滋養陽明以和經絡法黃耆銀花甘菊麥冬木通刺蒺藜甘草鮮桑枝鮮桑葉生苡米清阿膠無真者勿用十八日昨以滋養陽明和通經絡右手肩膀今日稍能懸起仍宗前法去阿膠因阿膠不真也十九日自初六日大便後已十有三日矣脈來弦緊燥糞塞於肛門今日又用導法下宿糞二三十團尚有宿糞杜於穀道緣正氣未充不能送出仿保元湯當歸補血湯炙黃耆黨參炙甘草當歸二十日宿糞杜於肛門先上豬膽繼用白銀耳挖挖出大小二十餘粒白銀耳挖已變黑色可見熱毒極重現余垢尚未清楚仍服前方二十一日昨下宿糞時頭汗如珠皆因病久正氣未充一派虛弱之象幸而眠食安寧今診兩關脈見澀病糞雖有亦屬無幾矣仿八珍湯去川芎茯苓加黃耆固表蘇子降氣潤腸桑寄生引入手經絡黃耆蘇子黨參地黃當歸白朮桑寄生二十二日宿糞下盡便溏已見昨夜至今早飲茶三次口中不幹心煩作悶似覺噁心小便雖有而混濁不利是上焦君火未能與腎水相交經所謂胃不和則臥不安小便亦因之混濁也擬以梔子入心而下交於腎豆豉入腎而上交於心繼以二陳加減定其心煩生梔子淡豆豉今早服梔子豉湯小便混濁轉清惟病後表裡俱虛內之津液不足心煩胃口作汎而不嘔睡覺不沉仿二陳加減洋參陳皮熟半夏大麥冬知母茯苓小麥二十三日停藥二十四日二十二日晚進二陳加減後半夜始能熟睡心煩已定惟不思飲食小便清白而少膀胱之氣未化兼之胃氣不和頓食在所不免仿異功散加木香神麯麥芽是開胃正方克伐之品非病後所宜用也洋參陳皮茯苓於朮木香炙草神麯麥芽二十五日昨進異功散胃氣稍和今早能食稠米湯兩碗據病者云前兩日其悶在胸下現在覺得悶在胸下仍宗前法加枳實消補兼行二十六日原方二十七日二十五六日兩進異功散而胃氣漸蘇小便混濁並覺澀疼是腎中之陰與胃之津液為結熱所耗如過於滲利則津液反致耗竭方中阿膠即從利水中育陰是滋養無形以行有形小便自清矣豬苓茯苓澤瀉滑石阿膠二十八日停藥三十日進豬苓湯小便早間清利午後短而渾似覺澀痛今早又清亦不澀痛且小腸是心之府主熱其水自小腸滲入膀胱胞中生熱應於心其小腸必熱經謂胞移熱於膀胱因熱而耗其水久病必氣虛則小便短而渾澀而痛也但已五十日經云熱甚灼筋必傳於骨骨熱則痿又云骨熱則背脊不能舉余現任其事不能不慮及將來展轉思維非補其氣壯其水其患焉能除耶上黨參茯苓白芍阿膠萸肉乾地黃牡丹皮炙草澤瀉六月初一日昨服補氣壯水藥小便清利不疼稠粥照前時食昨晚翻身自試骨脊難以轉側遂覺心中煩急余見其初次燥糞下後即謂內經有云熱甚灼筋必傳於骨又云骨熱則背脊不舉初病在臟腑初病在筋骨於滋養陽明以通利關節與六味地黃湯間日易服大生地竹玉菊花歸鬚釵斛蒺藜銀花藤桑枝初二日原方加陳皮白蜜初三日專取陽明以治背脊肩臂大生地天冬玉竹釵斛蒺藜麥冬歸鬚菊花金銀藤桑枝白蜜初四日大便如條下來不少臟腑無病可以弗藥飲食以五味調和氣血自然充復背脊肩臂亦可因之自如矣是日始能吃乾飯床上靠坐初六日移坐椅上初十日能自立起舉步尚須人扶十二日步履自如起坐亦便是病由三月二十四日出診起至六月初四日止計六十九日余於四月十九日按治至是四十四日也四十四日之中病變各殊方亦層易是時始占勿藥可謂世疾矣斯曰固由觀察任人不疑余始得竭盡心力然余於觀察居久見其事親孝得人厚其庭訓家法皆可楷模當世後嗣蕃昌理所固有揖趙世兄天姿早犖歷金門上玉堂指顧間事耳疾雖重烏足心困之余所以任之而不辭者也至謂用方選藥皆能中病此觀察之謬賞非余所敢承也因彙集脈案藥方乞方君長孺書之爰跋數語歸之揖趙以為他日之左券焉登階又記五月二十三日體格生來本不怯弱本月十二日正在一百六十日變之時誤作病治亂投消散之藥延至二十一二兩日抽掣大作角弓反張兩手足搐搦兩足及右手冷而弗熱目上竄舌苔根黃面焦唇裂證極危險經云熱極則生風風生則火動仿錢氏瀉青丸法如抽搐稍定方是吉兆龍膽草九釐梔子九釐羌活九釐防風九釐熟軍九釐川藥九釐薄荷葉四片當歸九釐竹葉三片蓋此為丸方依制折為湯劑不宜重也水煮服藥味共重六分三釐二十四日原方龍膽草一分三釐梔子一分三釐羌活一分防風一分川芎九釐當歸一分熟軍八釐竹葉五片薄荷葉四片水煎服藥味共重七分三釐外加一捻金一小粒二十五日二十三日服瀉青丸舌苔信煩退去其黃色如昨二十二三兩日皆於卯時起驚至午後抽搐稍稀二十四日申正角弓反張目光昏暗四肢乍冷乍熱至亥刻始定利下白垢穢糞如鮮腸今日巳刻前往診視舌苔轉成白滑熱去寒生已可概見經所謂亢害承氣也小兒筋骨嬌嫩臟腑脆薄邪已易入況內進消散之品外加推拿針灸之法渾身筋骨皆傷故動則啼哭不休致成危證現在亟宜培補元氣仿加味理中地黃湯若能搐定方可著手惟船小載重施救不易生死有命究非人所能執其權也黨參四分於朮四分炒黃耆八分炙制熟地四分棗仁四分炒萸肉四分破故紙四分炒當歸五分枸杞三分炮姜三分肉桂二分炙草二分生薑一片二十六日夏至一陰始生至二十六日寅初服藥二十七日服原方減去炮姜及肉桂一分二十八日兩目瞤動唇口蠕動掉舌吃乳不便虛煩右足一鉤立過即平復如初身熱而不熾兩足動時微冷不動則和所幸舌潤不渴能睡不露睛虛象明著然肝木旺必克脾土當趁脾平肝為要以五味異功散加減小柴胡湯輪流易服黨參五分於朮五分雲茯苓四分陳皮三分炙草二分鉤藤又方柴胡三分陳皮二分熟半夏二分白芍一錢梔子三分炙草一分燈草五十寸牡蠣二十九日原方六月初一日昨進異功散合加減小柴胡湯健脾平肝身外之熱已退八九而內里之熱未減據此情形雖大有轉關然奏效尚不敢輕必人小病深定多反復余初知其不甚易治因觀察托之諄切僅許以可關係匪輕用藥宜慎仿六君子湯加味黨參三分於朮四分炒半夏三分分制陳皮三分茯苓五分炙草一分白芍一錢柴胡二分梔子三分初二日兩目瞤動唇口蠕動項強不能轉側手足小動幸能吃乳安睡究竟脾氣不健吃乳後即行大便仿異功散黨參五分於朮五分炒陳皮三分茯苓五分炙草二分鉤藤一錢燈草三十寸初三日原方去鉤藤加六味地黃丸以滋腎初四日原方加炮姜一分木香一分初五日小動及舌掉時有心煩而啼吐乳似乎腹中疼痛之象仿異功散及蟬衣散黃耆八分黨參五分陳皮二分茯苓一錢於朮五分炒丁香一粒安桂二分灶心土四錢又方蟬衣三十個鉤藤一錢沉香二分燈草五十寸初六日熱漸清項強反側則啼手足戰振腹中作痛痛時汗多心煩不寐痛止則安夫汗乃心液多則傷陽仍用異功散加耆附以斂其陽炮姜以健其脾黃耆七分炮姜二分附子二分黨參五分於朮五分炒陳皮二分茯苓八分炙草一分生薑一片大棗一枚初七日早服異功散加炮薑附子黃耆戌刻忽然煩躁反復不安交子時更甚腹痛大作吐瀉兼至面赤汗淋而冷舌苔黑潤而滑利下吐乳是陽飛越於外陰寒在下之象危在頃刻仿仲景白通加豬膽汁湯即進一劑吐出冷痰一口利下盡屬痰沫腹痛煩躁稍定五更覓得豬膽汁照方再進一劑天明腹痛已止遂能安睡矣熟附子一錢五分乾薑一錢五分甘草一錢蔥白二莖童便一小杯第二次熟附子一錢五分乾薑一錢五分炙草一錢蔥白二莖童便一杯豬膽汁半小杯起初八日昨進白通加豬膽汁湯早間安靜午後時煩手足振戰時候不大每煩必下冷痰涎沫下後即定面上戴陽已退始見形瘦舌上黑色退淨汗止身和進以加味理中地黃湯初服微作嘔因徐徐冷服至戌刻能睡頗安靜大熟地一錢黨參一錢當歸一錢萸肉一錢於朮一錢炒枸杞一錢炙黃耆二錢炙草三分棗仁一錢炒肉桂五分炮姜五分熟附子一錢故紙一錢炒生薑一片大棗一枚初九日仍服加味理中湯原方初十日前日連進白通四逆及加味理中地黃湯亡陽證立止昨晚亥刻忽煩躁不寐兩目瞤動舌條伸縮不定腹痛反復卷屈時嘔逆時飽隔時嘆氣乳食不多小便不利止胸中痞塞關格不通心火上亢不能下濟下焦陰寒凝結不得陽熱之化仿半夏瀉心湯法如小便自利則痞格開矣黨參一錢熟半夏二錢乾薑一錢黃芩八分黃連三分炙草五分大棗二枚生薑一片十一日昨服半夏瀉心湯小便已利嘔逆亦止關格已開惟舌苔微黃尖紅尚偶作煩喉間有痰早間八點鐘後忽手振戰面色轉白轉睫之間即定面色亦赤手指經紋已現青色此心火仍未下降痰為火升法宜降心火理脾陽化痰順氣為主六君子加味黨參一錢於朮一錢炒茯苓乾薑二分黃連二分陳皮三分半夏二錢制南星一分生薑一片大棗一枚十二日診得身不熱能食乳安睡大小便如常舌尖紅退經紋青色亦淡並無飽隔作嘔等證惟頸折項強夜間時或目繫上急此針傷太陽經絡法宜舒筋和血為治歸芍四君子湯加天麻鉤藤苡仁黨參一錢於朮一錢炒茯苓一錢五分歸鬚六分白芍一錢天麻五分炙草三分鉤藤一錢苡米五錢十三日乳雖能吃而兩手時振啼而不寐先進半夏秫米湯繼以加味理中地黃湯夜間眠睡如常手亦不振矣黃耆一錢黨參一錢於朮一錢炒枸杞一錢故紙一錢炒棗仁一錢炒熟地二錢萸肉一錢五味八分炮姜一錢肉桂五分當歸炙草五分熟附一分生薑一片大棗二枚胡桃肉一個十四日服加味理中地黃湯平安十五日服加味理中地黃湯日夜安靜十六日正六次變蒸生膽身熱目不閉耳邊冷微熱不可服藥以亂其臟氣十七日變蒸身微熱停藥十八日弗服藥十九日熱已退清耳邊稍有未和是變蒸尚未退淨以加味理中地黃湯去薑桂小其制令候至次早與服乃亥刻忽又頭搖而啼搖定後復笑舉家驚駭遂以藥頻頻進之二十日診後以加味理中地黃湯仍加入薑桂增其制二十一日連服加味理中地黃湯三劑吃乳大小便如常能睡並無手振頭搖口動等恙十六日正值第六次變蒸之期生膽身熱目不閉耳冷因遵古訓停藥三日至十九日變蒸已畢忽於亥刻頭搖而啼搖定時有笑容睡不能安二十日仍進加味理中地黃湯日間搖頭十數次時有笑容夜晚啼而不寐脊項前三日稍能活動而強急究未能和按心藏神在志為喜心氣內虛痰氣遂上乘而為病喜笑舌動實此之由錢仲陽曰肝有風則身反張強直而頭搖總之虛則生風風生則火動火動則聚液而成痰上方加味理中地黃湯壯水以柔肝而息風培上以補脾而化痰此一定之法也惟現在眉上紅色總未見退久病現此究屬非宜余初診此病立辭不治以觀察諄諄見屬勉力應承今變證屢屢進退維谷惟竭盡心力以聽天命自揣審證不差方藥無溈即為不負觀察委任至於成敗非所逆者擬加味理中地黃湯去枸杞五味肉桂加阿膠草河車為法大熟地三錢萸肉一錢黨參一錢炒於朮三錢黃耆二錢炙故紙二錢炒酸棗仁二錢當歸二錢草河車一錢炙草四分生薑一片大棗二枚炮姜八分二十二日照服原方二十三日早間夏媽奔告以夜間不甚吃乳哭不安謂喉間紅腫余急往診見其眉上紅色已退頸項俯仰自如頭搖笑容亦止細視喉內清楚無紅腫之事令人抱起則不哭而吃乳矣始知諸病皆愈其啼哭乃欲人抱也撫視小兒全在心細審視不清乃竟以咽喉紅腫來執使魯莽者不加細察投以清利之劑則為害不淺矣據述前有兩三位小兒俱得驚風而死今得此驚慢而能愈者亦十中難一耳熟地一錢當歸一錢黃耆一錢炙萸肉一錢黨參一錢五分於朮一錢五分故紙一錢炒炙草三分棗仁一錢炒阿膠一錢生薑一片大棗一枚二十四日熟地一錢當歸八分於朮一錢炒萸肉六分故紙一錢炒阿膠一錢茯神一錢炙黃耆一錢棗仁六分炙草三分麥冬五分釵斛五分黨參一錢生薑一片大棗一枚二十五日黨參一錢於朮一錢炒半夏二錢陳皮五分棗仁一錢炮姜二分黃耆一錢炒胡紙一錢炙草三分乙酉暮春上浣子嚴方伯以手諭見示謂令媳大少奶奶患病雇舟來邗就診病因氣鬱血結六七年來每食已有噎逆之勢日積月累遂成膈證上中下三焦阻塞不通飲食漸薄二便不行法在不治然以素蒙篤信兼之諄囑遠道而來勢難推諉始用藥以通其氣繼動其血知系宿疾非下不克然久病氣虛非補不可選用大黃人參化積丸攻補兼施數日間得下黑燥糞頗多積漸去胃漸開飲食日增調以保元補陰八味等丹丸諒易康復細思此證病情已極百難愈一得以如法奏效者亦全賴大少奶奶之鴻福鄙人豈能挽回天命不過因證用藥尚無錯誤足以仰副方伯諄囑之意云爾乙酉二月十九日方大少奶奶心膽虛怯如人將捕之狀時而驚悸心中跳動不寧寤不成寐胸中之氣上衝則咽中如有肉塊堵塞大便閉結五六日一行食物則噎已有六七年矣爾來只能食稀粥薄物倘食乾飯則中脘格拒如針刺疼按心跳是怔忡來源食下阻隔是噎膈已成此證本屬不治如能看破俗事不生氣不煩惱或者可愈仿仲景法川樸半夏茯苓生薑蘇葉二十一日延胡乳香蘇葉半夏生薑三月初三日寶應來住船上因悲哀過度咽喉堵塞胸中格拒食物稀少勉強納下則胸中痛如針刺大便不通面色青黑此病最難著手川樸蘇葉半夏茯苓生薑初四日川楝子延胡烏藥川樸半夏茯苓丹參蘇葉陳皮砂仁初五日氣鬱積勞有年陽氣漸衰濁凝瘀滯格拒在乎中焦飢不能食或食喉開不能下咽故水液可行乾物梗塞此證皆因七情五志過極陽氣內結陰血日枯中脘阻隔如針刺疼不食不便噎膈已成有何法想遍查古今方書噎膈之證四十歲以里者可治四十歲以外者不可治也太倉公云治之得法未有不愈者探其源中脘必有積聚頑痰瘀血逆氣阻隔胃氣所致先用消瘀去痰降氣以潤之繼進猛藥以攻其積或可望通然此證多反復必須身心安逸方可欲病川楝肉延胡桃仁紅花薄橘紅川鬱金栝蔞皮半夏初六日原方初七日杏仁半夏桃仁蘇子鬱金枳實歸尾蔞皮川連薑汁膏滋藥熟地生地山藥枸杞當歸萸肉炙草白蜜初八日三方一日分早中晚服初九日三方分早中晚服初十日膈者阻隔不通不能納穀病在胸膈之間足陽明胃經燥糞結聚所以飲食拒而不入便結而不出都因憂患氣結日積月累遂成噎膈之病必須釜底抽薪最為緊要揚湯止沸愈急愈增歲月深遠無有不為似是而非之藥所誤此膈病之所以不能愈者天下皆然鄙意既有積瘀非下不通他人以為久病正虛張眼吐舌殊不知下法各有不同此證積瘀已久非攻補並施不能勝任此法雖猛百無一生之證急用之尚有餘望否則逡巡觀望何濟於事大黃人參芒硝桃仁歸尾䗪蟲白蜜為丸早晚兩服日夜下黑糞如羊矢黑血膠結半桶上焦稍寬十一日服法照前日夜三四回下糞如羊矢黑血更多干粥能進二碗一頓聞飯香極無氣味矣十二日服丸如前日夜下糞如黃豆黑血半桶而黑血不多矣早起吃粥加一碗多能睡而安十三日停服前丸息二三日看其動靜服膏滋藥三次時刻想吃矣十四日吃飯一鍾想添不敢添頭面四肢腫盛此下後虛極而腫十五日前用攻補兼施直透關鑰引宿積之瘀一湧而出所謂陳莝去而腸胃潔癥瘕盡而營衛昌胸中豁然能吃飯一碗矣脅下腹中作脹大便三日未行先進和中暢衛法蘇梗香附連翹木香蒼朮川芎神麯桔梗川貝砂仁生薑十六日上焦寬展下焦脹墜結糞已在腸間直至肛門津液為燥屎耗干真氣虛弱不能傳送而出用保元養液丹八分前丸二分幸而食飯又增至上燈時連出四次屎如羊矢如小豆約有半桶而無瘀血矣十七日結屎已行腹中脹墜不覺飲食又增矣鄙意總要宿積去盡方算拔去病根恐其日後再聚也用保元養液丹八分前丸二分煎方並用大生地栝蔞枸杞山藥當歸炙草十八日安睡太平又下黑屎如小豆者極多予思此屎皆耗亡胃陰之物今積聚已去而元氣耗損已竭用保元丹調養心脾以舒結氣而固真源用補陰丹填精益血以滋枯燥而補胃陰防其再為乾枯閉小也如胃陰日充在上之賁門寬展則食物入在下之幽門闌門滋潤則二便不閉而膈證愈矣渾身皮膚虛腫十九日大便已轉白色而干飲食下咽並無格礙矣服保元丹二回煎方一帖虛腫仍舊二十日大便如貓糞灰白色是腸胃受傷已極非數日間所能復元也保元丹補陰丹二十一日午後大便糞色稍轉黃色服保元丹兩次八味丸一次虛腫仍然二十二日連日飯食加添且能吃肉各種丹丸照服浮腫亦漸見消二十三日大便糞色漸黃且不結燥亦不間日而出矣飲食加增頭昏作痛者因天暖悶躁在船上其氣不得舒暢所致無礙也二十四日中焦膈塞已降食飯下咽不噎惟咽喉間似乎有氣上堵或有忽無此是家常素昔心有不平之氣所致宜開懷養息自無此氣也仲景云吐之不出咽之不下之氣也七氣湯主之方大人喆嗣仲侯同予講究醫術之友也其令正患乳射舟廣陵就正於予知其所患是干奶乳慄乳節之類也肩輿至舟見其右乳堅硬如石重墜乳頭縮入七處潰出黃水瘡口翻出頭昏眼赤羞明舌灰焦厚業已昏暈按乳有十二穰今已竄七穰如再遲延全行竄破勢必翻花成為乳岩扁鵲復生亦難挽回予遂進疏肝解鬱重劑乳頭伸出瘡口肉平頭目清爽又夾進膏丸堅硬消軟而遍身透出鮮紅膿窠瘡幸矣哉予獨不解一乳核何以轉到如此之險而旬余竟能收功實力始念所不及此皆仰賴大人洪福故能得心應手因思有謂予治病價大者不知世俗不曉醫之賢愚病之輕重此予之所以活而不活也病固是大手筆然士為知己者用重以相知之誠僅取藥資夠敷藥品管仲無鮑叔其名不彰知己知後可耳夫看病全在識證不求對證用藥但拘執偏僻鮮有不成大患者予年逾古稀閱歷雖多究於岐黃之術尚剋剋焉而不敢自信總之生死定數大病能愈亦是定數予非能生死人也此自當生者予能使之起耳吳淮安曰人不死於病而死於醫誠為痛快語予深慕之聊記數語並附脈案藥方於後留為仲侯閱看云爾丙戌二月上潮瀨江沈青芝識吳子聖教服陽和湯二十餘劑以致如此正月二十二日凡不乳婦人害乳名曰干奶子初起結核如棋子漸大如雞蛋有名曰乳癖乳慄乳節乳患之名有十餘種但外科重在消散然乳生此證皆因肝火太旺氣血凝滯而成先宜疏肝解鬱消核不至破爛方為正治法門今右乳周圍漫腫乳頭下而及近胸近夾肢處已破爛五六塊淌水瘡口胬肉翻出其漫腫堅硬如石乳頭縮入不見大非所宜況乳頭屬足厥陰肝乳房屬足陽明胃經言婦人之乳男子之腎皆性命之根也奈何遠道而來不得不代為擬方以疏肝解鬱為法銀花一兩公英一兩熟附片一錢天花粉木通通草柴胡茯苓梔子仁白芥子鮮橘葉三十片如無橘葉用青皮元壽丹龜蓋一個燒存性研末蜜丸三賢膏鮮忍冬藤五斤蒲公英五斤夏枯草五斤煮取汁白蜜收膏早起服三賢膏三錢午後服煎方二次睡時服元壽丹三錢二十三日二十日納薄物睡倒不能起坐破處淌黃水乳不知痛舌中作痛而乾燥難忍瘡口五處翻出若不知痛乳岩必成神仙無法服藥照前二十四日右乳中忽作大痛重墜難忍一刻不得寧下午近胸處破頭淌黏黃水夜間痛止安眠按乳有十二穰今已竄七穰如十二穰概行竄到堅硬如石不軟即是乳岩也服藥照前二十五日右眼紅腫羞明渾身四肢發出鮮紅膿窠稠密癢極難忍乳中不痛自覺重墜稍松去一二分飲食加增矣遂將原方減半銀花五錢公英五錢附子五分花粉木通通草柴胡茯苓山梔白芥子鮮金橘葉元壽丹三賢膏照服二十六日舌上灰黃厚苔退清乳亦不痛精神漸能振作飲食又能加添服藥照前二十七日乳頭伸出瘡口胬肉平復能起床行走自覺乳之重墜又松上面未竄之五穰可以不至再竄而破爛矣二十八日至三十日眼赤漸退飲食眠睡如常乳之上面漫腫堅硬處似乎有些鬆動乳之左右及下面仍堅硬如石毫無消動破處時流黃水惟乳按之不痛耳服膏丸照前二月初一日飲食眠睡皆如平昔惟乳之破爛只流黃水而毫無痛苦添方易服鮮銀花藤生嫩黃耆潞黨參真於朮茜草白芥子全當歸膏丸照服初二日至初五日乳上堅硬漸消瘡口潰爛處黏水漸干只有一處淌水初六日至初十日瘡口全行收攻乳之左右上下堅硬如石已消軟一半無庸貼膏藥回憶如此險證不過兩旬竟能轉危為安真屬萬幸十一日回府煎藥即行停止其丸藥膏滋藥吃至乳中核消再停至遍身膿窠熱毒儘自愈不必醫治也春夏秋冬發瘧不同處暑前後白露前後霜降前後冬至前後有大分別不可一概而論內經云一日一發邪淺間日一發邪深三日一發則邪更深矣一日一發者當五日愈以五日為一候五日不愈當十五日愈三五十五日為三候也三候不愈當一月解此瘧之一日一發之大略也內經論瘧甚詳日日發有半年一載而愈者三日發者有一年二三年而愈者皆有經文可考也據述九月初七日戌刻發熱子醜有汗熱解至十二日正寒熱交爭之時適值月經又到將欲作汗誤聽人言用火煅醋醋氣外逼汗即不出以致內里作燒外面皮膚不覺火燒瘧後昏迷時許方蘇遂作濕溫治大進苦寒涼血之品漸漸胸腹疼痛呼號不能停聲二十二日人傳單方用麝香等敷貼胸口是日竟得大汗連用三日皆有透汗其病由輕而致重由外而入內故變證百出不死福也丁亥四月二十一日午刻寶應專足到揚方三少爺揖翁信云兆萱小姐吐病復發身熱昏睡數日矣余於午後三點鐘動身二十二日夜九點鐘已到寶應公館矣二十三日因平昔亂吃肥甘生冷零碎之物以致脾傷氣滯津液損掌心熱偶爾受涼多食則嘔吐身熱之病復作昏昏沉沉數日不解合宅驚慌諦思此證已到發多次是宿食積於腸胃內液日乾經云小兒疳積是也川樸神麯陳皮茅朮栝蔞仁紫蘇子甘草車前子二十四日小兒臟腑脆薄瞎吃傷脾津液耗乏面青白而無華色唇白舌中白膩而厚掌心亢熱大便閉塞胃日強脾日弱經所謂胃強脾弱即是疳積狀貌經云胃虛則吐細視面色唇舌其色淡此由滯在內復為食傷虛證也只能扶正勝邪宜補以潤之或者大腸不燥胃氣和其積可消若用消磨攻下之法重傷正氣是為虛虛矣擬早服五仁丸午後服參苓白朮散人參白朮茯苓桔梗山藥扁豆砂仁甘草蓮子杏仁桃仁柏子仁郁李仁松子仁陳皮研末煉蜜做四丸約四錢一丸分作四日服夜半出黑粒屎如串珠兩條約二三十粒二十五日丸藥煎方照前日服又出黑粟如串珠三四條二十六日丸藥煎方照服又下黑粟不少但屎黑如龍眼核焦乾而無潮潤之氣此正氣不足故大便積聚塞住肛門而難出也二十七日小兒有病皆由受涼吹氣飲食不節致傷脾風滯積膠固日久正氣愈傷細問病之情形兩年來已發十餘次病發則嘔吐發熱昏睡手心燒大便結日積月累內中津液為陳積耗干胃日強脾日弱幸而發未焦枯如發不潤澤則疳積真矣余用五仁丸以潤大腸參苓白朮散以補脾土三日間連出黑粟屎甚多然歷年致病之陳積猶未下也必須正氣充足脾氣健旺庶乎可望積消矣擬補中益氣湯以升降清濁是三道之法也黃耆人參白朮柴胡升麻陳皮當歸炙草生薑大棗二十八日昨日又出黑粟屎如串珠者兩三段掌心熱雖未退盡以手重按之似乎不大幹亢矣仍服原方二十九日從早起至午連出三次黑屎其中如豆粒如鈕釦色黑如鐵彈夾在屎中頃刻間又出新糞實屬不少四歲小兒腸胃多大數日間出陳屎新屎如此之多可怕人也積去病差非傷食而何俗云病從口入以後切不可再使小兒飲食不節小心謹慎一百二十天真氣復元其積自無矣若不留心仍蹈前輒雖和緩亦難挽回慎之慎之丁亥八月初二日萬秋圃分轉招余為令媳大少奶奶看病問及病形原於七月二十日生一女孩上床即血暈數刻方省朝朝請醫診治愈治愈劇將近十日於二十九日忽然昏倒不省諸明公束手無策坐任其敗而已延至初二日下午已有三日身後之衣穿好鼻無呼吸挺直僵臥惟腹大而高上半身溫和下半截冰冷脈息未絕診之並無七惡形狀大凡產後肚腹當小而軟不應不而高憶經云產後血已盡傾心無血養血舍空虛止存微氣所剩殘血非正血不可歸經而離經之血既不能歸經又不下行必至上攻心胸因有此變思維至再遂用黑龍丹去瘀生新繼以華佗再生丹大豆酒徐徐灌下夜半惡露大行至初三日手能動眼能開似乎有轉機矣然此證病情已極百難愈一得以如法奏效者只求對證用藥尚無錯誤此亦大少奶奶之鴻福鄙人豈能挽回天哉所謂藥用當而通神也轉危而安藉以仰副分轉諄囑之意不負委託而已八月初二日清晨萬竹軒兄來寓云侄媳大少奶奶於七月二十日生一女孩至二十九日忽然昏厥目閉牙關緊急鼻無聲息惟心胸氣動腹大從大腿至腳若冰上身及兩手尚溫余詢其病狀與黑龍丹一粒囑其速回灌下看其動靜至午後又來招余往診僂指厥已三日殮衣皆著僵臥不動待死而已細問灌下黑龍丹之後有瘀血大行幸天轉新涼兩手脈無七惡狀或者可救速用華佗再生丹大豆紫酒循序灌下至夜半惡露大行兩手微動腹大漸平但聲息未出耳初三日往診詢知大腿漸溫腳未溫呼吸微而細病已轉機可望活矣問及藥剩半杯加藥催其時刻灌之至近晚眼能微開夜半兩手活動腳亦稍稍能伸縮余算已四日死而復生者亦奇事也初四日大早往診手足活動能出舌尖看苔尚未能言近午始能語聲微無力遂易方用獨活一味大豆酒和童便服之近晚來字云病人口渴要吃茶又云渾身發燒摸其皮膚似乎有熱頭上身上有汗病人云雖汗不嫌暖竊思酒系發暖之物故未敢與服等語余曰惜哉未厥之前服藥何其膽大如天今既甦醒何以膽小如豆殊不知獨活去風黑豆酒消血結且有童便滋陰降火如若早服可以立見陰陽經脈流通經云藥到病除一汗而愈此之謂也余恐產後致病遇天時陰雨難免渾身有困痛之病病及時怕用良可惜也獨活黑豆酒童便初五日脈象稍斂而不浮散舌苔白膩舌中至根灰黑口渴舌潮不幹身汗不離兩腳和暖潮潤聲音微細精神疲睏面上時有虛火上炎夜睡不沉的是產後氣血雙虧本證諺云藥醫不死病其信然歟黃耆當歸童便初六日舌上灰黑之苔退盡臉上虛火上炎一少動則有汗自覺痰吐味腥神氣稍好幸而體實本足偶為藥傷竟能轉危為安余曰天也命也有福者不死也人參黃耆當歸附子炮姜童便初七日夜半大小便俱解身汗亦少臉上亦不上火舌苔薄白面上現有病容能熟睡惟有痰腥而已人參黃耆炮姜當歸童便初八日小解時仍有惡露下行臥亦安寧若能早記古人不藥為中醫之誡何致如此之驚人也人參黃耆當歸初九日吃粥三四次轉側皆能自如惟多口渴初十日胃氣漸開能坐在床上吃青菜湯飯痰雖多而易吐也杏仁十粒川貝三粒煎濃汁調鍋粉三錢服十一日睡臥神安飲食有味計算移出堂屋睡臥共十一天今日竟能扶走進房余曰災難已滿從此可祝多福多壽矣丁亥八月中旬方果卿明府如夫人由如皋雇舟來揚診視詢及病情是五月間咽喉腫痛而起月餘自覺在乳下虛里其脈貫鬲上絡於肺其氣上塞喉管嗌中乾燥或癢或痛時要吐痰一口喉中稍爽漸添肉瞤筋惕睡中驚掣則心中築築然搖動而不得安靜似乎渾身百病皆作矣細看咽喉左右傍兩條起腫結久成核其氣上窒則咽塞氣下則咽通似乎是梅核氣人亦疑是梅核氣但咽門內上下紅絲纏繞中起顆粒壘若蝦蟆皮中關將近下關如浮萍略高而厚或有如茅草常刺喉中又如硬物隘於嚥下直至下關肺管看之不見咽中乾燥或痛或癢其氣時通時塞遍查古書梅核氣吐之不出咽之不下咽門內無顆粒紅絲形狀且病者咽中自覺有氣如珠直貫心下作痛亦與梅核氣殊內經云少陰少陽君相二火其脈皆經絡於喉手少陰心脈挾咽足少陰腎脈循喉嚨一陰一陽結則痰氣凝滯於喉間皆因思慮過度中氣不足肺氣不能中護虛火易於上炎致有此患難治之證也仿金燥不能生水為法煎藥膏滋藥丸藥吹藥並用以觀動靜元參五麥冬五白蘇子一白薇一甘草鼠黏子紫菀一白芥子百部三水煎日服三回前方連服二十多日自覺嚥唾咽喉不大幹燥癢痛亦稍止矣咽門內顆粒未消動仿育陰以治虛火若能腎火不上衝方是吉兆大熟地五麥冬四苡米五桑白皮五生地萸肉四川貝母一甘草一水煎日服二回此方連服半月咽門顆粒及兩旁結腫內結小核又非喉瘤形狀幸而左右二條日漸消軟其核小而堅尚未大為消動耳煎方膏滋藥丸藥吹藥並用加銀花藤熬膏日服丸方薄荷君三神丹臣一名玉丹火硝煅時比玉丹內火硝加一倍牛黃佐璉珠佑川貝佐燈草灰使百草霜使甘草使冰片使研細末蜜丸如桐子日服三回每次服六丸膏滋藥方即前第二方加銀花藤吹咽消堅化積散蛇皮白玉丹牛黃珠子燈草灰百草霜甘草冰片共研極細之末日吹三四次吹咽至聖散化腐生肌敗毒蒲黃牛黃人中白兒茶白芷薄荷月石冰片研極細末日吹三次十月中旬咽喉痰氣時開時塞咽門內紅絲紅顆甚密遍查外證咽喉門證名甚多今指數證大約相同有喉疳過橋疳喉癬及魚鱗肺花二瘡又有喉菌生在中關下些如浮萍略高而厚紫色又有喉節生在近喉管處看之不見有似梅核氣吐不出咽不下梅核氣咽喉無紅絲顆粒不痛不癢痰無腥味喉節初起與梅核氣無異久則漸吐清痰爛腐臭味矣皆由憂鬱思慮血熱氣滯而生婦人多患之虛火上炎所致也余思經云有火便是毒遂用鮮銀花藤熬膏煎方丸藥吹藥並用咽喉內顆粒如浮萍均已消盡而咽喉傍左右兩條腫硬亦消軟痰無腥氣痛癢漸止左邊結核消如綠豆大剩有兩粒已至舌根下右邊之核亦漸消動如黃豆大一粒按之此種病證都因腎水耗損腎火上衝金燥不能生水所致服半月後再議十一月十九日咽喉乾燥癢痛皆定痰吐無腥味之氣已有半月肉瞤筋惕睡中驚掣亦稀惟嚥唾嗌中之氣自覺如珠節節滾下至心作痛時而氣逆即噯飽四五聲吐痰一口氣順則已若噯飽不通氣便作悶矣查氣門呃逆氣上衝連呃作聲也噦有物無聲曰吐有聲無物曰噦噎咽喉蔽塞噫飽食氣滿而有聲噯噯氣又暖氣也此五種病皆由肝鬱氣逆中來肝鬱氣逆胃當其衝因而胃為氣逆見此外證內病辨之甚難總而言之是傷於七情而成經所謂五氣之郁皆足為以上種種病因非若客邪之比除之未易故功雖僅虧一簣策則驟乏十全蓋鬱則務求曠達病屬七情藥物之效止居其半必須戒惱怒節飲食慎起居毋致另生枝節然後博考方書細籌良法病或抽絲引絮而去芻言正所以勉力圖功也俟咽喉之結核消盡再議丁亥五月中旬方仲仁所欲不遂神識迷惑郁久則五志之陽上薰痰聚心包蒙閉清竅漸致神志恍惚有似癲瘋其病不在一臟也七情致損非醫藥之所能愈已若能遂其所欲或者有可愈之機未可知也仿溫膽湯法半夏枳實竹茹橘皮茯苓炙草生薑大棗八月十六日病因抑鬱不遂佗傺無聊而成精神恍惚言語錯亂夜不能寐或笑或怒或耳聞人語目中時見鬼神脈見乍大乍小大有狂意而狂甚則不避親疏矣仿豬心血丸豬心血硃砂茯神牛黃真珠琥珀石菖蒲遠志共研末豬心血搗和為丸每服二十丸二十八日經云陽盛則妄言罵詈皆因氣鬱生涎涎與氣搏則千奇萬怪無所不至矣惟大便或四五日一行痰吐清白不息如痰火一平則神清氣爽而寐亦能矣仿甘遂丸以通大便抱膽丸以定狂為法甘遂末以豬心血和勻將豬心批作兩片入甘遂在內再合紮緊紙包濕又文火煅熟取藥和硃砂研細再和豬心血為丸二錢分作四丸或分作六丸日二服抱膽丸治一切癲癇風狂如病大發只服一丸二丸多則三丸即止此方即黑錫水銀硃砂乳香四味也昔忠懿王之子得心痰合此藥偶有一風犬飼之即蘇因破犬腹視之則其藥抱大膽故因名之其病大發之時只能服一丸風定即止焉能多服也九月初十日日服甘遂丸二粒而大便潤痰吐亦少早起服抱膽丸一粒共服三丸而狂定夜間安靜且能睡臥矣十五日目中不見鬼神耳中不聞人語痰吐亦少早起必飲燒酒數兩且酒乃助熱生痰之物而日必飲之況酒醉亦能發瘋動氣有此病者酒不能戒雖神仙無能為仿鎮心丹鎮心丹治癲癇驚悸一切痰火之疾天南星天竺黃犀角尖牛黃真珠琥珀雄黃牛砂研末蜜丸每日午前服二十丸郁礬丸治此癲疾由七情得之痰涎包絡心竅此藥能去郁痰川鬱金生明礬薄荷研末蜜丸每服二十丸睡時開水下十月下旬靜坐太平約有四十日所服兩種丸藥已完停服丸藥緣痰火已不上升而時有憤憤不平之意此心病也且時笑時笑者傷魄故易怒怒後必歌唱不休陰鬱而陽動也憤憤者其病在心在心者不可治徒勞無益也十一月下旬此病本起于思欲不遂久則生熱痰隨上僭得治稍效一不遂則復發再不遂則再發上工治未病余深愧對其人也姑仿九精丸一法並錄古賢法語二則於後九精丸一名九物牛黃丸治鬼魅欲死所見驚怖欲走時無休止邪氣不能自絕者越人云治風痰諸癇狂言妄走精神恍惚思慮迷亂乍歌乍笑靜坐如癡牛黃土精一云火精龍骨水精空青火精雄黃地精荊實火精魯青蒼龍精玄參玄武精赤石脂朱雀精玉屑白虎精上九味名九精上通九天下通九地研末丸如桐子服一丸惜因價貴不肯配服朱丹溪曰五志之火鬱而成痰為癲狂以人事制之如怒傷肝者作悲勝之以恐解之喜傷心者以恐之勝以怒解之思傷脾者以怒勝之以喜解之憂傷肺者以喜勝之以怒解之恐傷腎者以思勝之以尤解之驚傷膽者以憂勝之以恐解之悲傷心包者以恐勝之以怒解之此法惟賢者能之一婦人飢不欲食常好怒罵欲殺左右惡言不輟眾醫不效戴人視之曰此難以藥乃使二娼各塗丹粉作伶人狀其婦大笑次日又作角觝又大笑其傍常以兩個能食之婦挎其食美病婦亦索食而為一嘗之不數日怒減食增不藥而差後生一子夫醫貴有才則何以應變無窮余思經云重陽者狂重陰者癲而所言皆家務事十多年來鬱結於心觸動其怒則痰火上升蒙閉清竅則不認親疏矣沈圭云兄弟以不分家為義不若分之以全其義婦人以不再嫁為節不若嫁之以全其節也會心人自知毋庸多贅戊子五月二十九日眼喎斜舌強不語口中流涎神氣昏迷大便不通已有七日先用豬蜜導法此中風大證用藥甚難仿轉舌膏法連翹山梔薄荷黃芩石菖蒲大黃芒硝遠志水煎徐徐而服烏龜尿點舌上豬膽汁白蜜熬冷做一寸長塞入穀道六月初一日大便下燥糞不少幸而導通能愈之兆也服原方初二日閱方雜亂下焦瞎追上焦已受累不淺矣服原方柔潤息風化痰天麻釵斛天冬枳實生地竹瀝豆汁地慄汁梨汁柿霜熬膏日服二三次初四日神氣或明或暗仍服原方初五日診左手脈軟而細右手脈洪而弦二便通暢中脘時悶時寬神氣乍明乍暗口喎舌歪口流涎鼻孔乾燥經云中府者多著四肢中藏者多滯九竅前用轉舌膏膽蜜導大便通繼以柔潤息風化痰法鼻孔潮潤有涕胸中神氣漸清年高之人涸榮耗衛之藥似乎不可用也膏方內加沙參葛根煎方無庸更改若要日日換方治病無此法也初七日始能開口出聲閤家歡喜人聞之亦伏心仍服原方勿怕初八日能說出我要吃三字已見轉機仍服原方膏滋方加重添清音法天麻天冬當歸黃菊花釵斛元參麥冬梨汁黑豆皮蔗汁竹瀝薑汁柿霜熬膏另研遠志菖蒲各三錢秤二分和膏化服十五日神識日清起動飲食睡臥二便皆可能言四五句矣細看舌根厚邊紫滿舌光紅而無苔舌伸出斜在右邊故轉掉字眼難清此乃心包絡間久積之熱瀰漫以致舌本不靈此等病證而能有轉機者恐非醫藥之力也余謂和翁素性純孝至誠感格孝心能迴天心信不誣矣以後起動必須人在左右扶之切勿大意仍仿柔潤調和法不離去風清熱化痰皆效古聖賢之法也天麻沙參羚羊角當歸桑葉菖蒲生地連翹黑豆皮水煮兩回服夜間服膏滋二十日神氣清爽能說十多句四音兼備大有轉機惟舌紅無苔伸出舌尖尚未全正服原方加山梔二十五日診兩手脈漸和惟左手稍大而弦精神日漸健旺但舌紅猶未起苔心經之鬱熱未化也仿加味轉舌膏連翹山梔黃芩薄荷元明粉大黃竹葉防風桔梗石菖蒲犀角川芎甘草柿霜研末為丸如桐子大秤一錢半煎汁去渣服二十七日據云扶杖可以自行數十步舌尖仍斜而未生苔仍服丸藥二十八日大便通暢精氣神日見健旺再能舌尖端正紅淡生苔方佳停服丸藥單服膏滋七月初二日清晨往診左寸獨大余皆平和精神步履較前十日似乎稍健舌上紅光比前亦淡考各大家方書三十六種論舌苔者言舌本乃心之竅心屬火熱積於心包絡之間故火鑠加以天氣酷暑邪火相搏舌紅無苔實此之由現喜紅淡即有生苔之象再進滋養之劑冀奏全功熟地萸肉山藥丹皮澤瀉茯苓水煎兩次服釵斛天麻麥冬菊花沙參天冬枳實白蒺藜煮三次取汁竹瀝薑汁梨汁蔗汁柿霜將前汁同煎收膏用柿霜日服二錢余雖業岐黃有年兢兢不敢自信誠恐用藥不能對證則貽誤匪淺近已年逾古稀猶不敢輕出問世因廖君孺慕之心不減古人不得不代一診且幸信任不疑病竟能獲效此皆得天之佑以假手於余余何力之有焉嗣後冷暖飢飽起動均要留心靜養百日精神筋力復原如舊方可放心如大便一日不出恭即服丸藥一錢不必候至第三日不出恭而再服丸藥第二日即可服既出恭停止勿服廖兄和軒粵東人余之十餘年友也突於戊子五月二十九日來寓云老太太七旬有四五月二十二日忽覺項間不舒夜半遂中風不語延至二十九日易醫數人服藥無效問及病情中脘昏悶神氣不清口眼喎斜口中流涎大便不通余思易曰風自火出諺云熱極生風乃知類中風無有不由心腹中風熱兩作也仿用吐法導法及下法轉舌膏等法至六月初七日始能出聲神氣漸清仍用柔潤息風化痰之法加減熬膏日日服之至二十三日漸能言語至十多句四音亦分而其舌伸出尚斜未正舌紅無苔是心絡中熱熾無形之火以灼有形之痰故舌紅而無苔也觀河間內火召風之論用苦泄辛降吐之下之余仿其法易以柔潤甘寒折其上騰之威使諸竅清空濁痰不能矇蔽此宗經旨風淫於內治以甘寒法也但年高之人得此大證尤屬難治余因和翁孺慕之誠形於顏色知侍母至孝孝且可格天余敢畏其難而不任其責耶故盡心推求病源竭力省察病理所用之藥似皆平淡無奇而竟能對證暗中定有神佑殆亦孝感所致也余第不負孝子之誠敢謂藥之竊能應手哉今將脈案方藥錄記並書數語以志顛末丁亥正月初十日吳吉甫觀察夫人產後有病余追溯十年前連生女孩後歇十年未開懷去年十二月初六日復產一女因望子情切心中憂悶十日內毫無病痛至十六日下床收拾被墊忽然疲倦身發寒熱以上皆劉一翁所治延至正月初十日始來招余余思新產婦人有三病血虛多汗喜中風故令病痙亡血復汗故郁胃亡津液胃燥故大便難何等沉重所以寒熱發後加之氣鬱痰涎漸入包絡產後瘋癲之基已兆終日神氣恍惚刻刻怕死閤眼則諸事纏擾時生驚恐不能安靜大便溏及欲二便時亦不自知覺飲食無味不寐唇燥氣逆中脘是一派心虛痰積火生所致病延已久恐難除也仿麥門冬湯以降中脘逆氣十一日服麥門冬湯夜間睡頗安惟心虛膽怯時生疑慮駱龍吉云疑久生魔余思產後一見寒熱遂即落瘦脫形狼狽如此恐其痰入包絡妄言妄語將成瘋癲症矣仿救逆湯合麥門冬湯十二日乍明乍昧精神恍惚午後則思慮擾心顛倒迷亂驚怕異常合目則神魂飛揚夢寐中欲不哭而哭不出病狀亦難自鳴諸親友及名醫滿坐均疑有醋心不問病理殊不知產後風狂癲癇驚悸古書各立有門以及心疾似真似假似癲似癇所論甚詳余與吉翁相交數十年敢不盡心奈一齊人傅眾楚人咻議論不一縱思立方而左右搖惑者多亦不能專心服一人之藥余察真情既不能深信終屬徒勞無功將有歸咎於余者余何甘焉此不得不推手者也聞後來漸以假成真雖有方藥又何敢妄陳耶壬辰正月初三日呂叔梅先生來寓邀予為方仲仁夫人診病細詢病情云由左腿痛起串至右腿隨上串右手肩臂五指肢節腫疼筋縮如鉤漸又串及左手肩臂五指筋縮如右渾身骨筋孿急勢是抽搐著床兩足立緊人亦不能分動皮外癢而內疼日輕夜重經書風熱勝則痛濕熱勝則腫竟成白虎歷節風疼痛不可屈伸之證矣經又言寒鬱其熱究其病源素來體胖痰多大抵虛致邪聚而尤氏云此證若非肝腎先虛則雖有濕氣未必便入筋骨況肥人多痰痰亦濕氣所化今風寒濕三氣合而為痹直入於關節筋骨之中則四肢牽掣猶如刀割病已如此癱瘓難免矣視其病之形狀細揣病理邪既深入必須驅之外出予若以風濕門諸通套藥施之何異人已入井而益之以石乎不得不用猛烈重劑直入巢穴希圖有濟未可知也仿仲景桂枝白芍知母湯法治之麻黃二錢桂枝四錢附子二錢甘草二錢白朮四錢白芍三錢防風四錢知母四錢生薑四錢初四日昨服原方渾身疼痛稍松右手指亦能稍動惟舌上白苔如雪咽痛口中不作干初五日兩手肩背指稍能伸動自覺渾身亦稍為輕鬆初六日原方連服三劑日見鬆動未添別證痰吐亦多夜間始能安神熟睡惟兩手肩臂彎痛不能動此風寒深入於骨髓之中難於外達不得不用仲景烏頭湯以驅筋骨中凝結之風寒若除之不去廢疾難免如錢仲陽為宋之一代名醫自患痹證止能移於手足為之偏廢不能盡去可見其為難治也麻黃二錢烏頭二錢白芍四錢黃耆五錢知母四錢黃柏三錢炙草二錢本方加桂枝三錢白蜜四兩水三碗同烏頭煮取汁一碗去烏頭另將藥七味水三碗煮取汁一碗納蜜汁中更煎數沸約兩碗分三次服初七日服原方兩手指肢節腫脹漸消渾身骨節疼大為鬆動飲食稍為知味夜間安睡惟肩臂彎痛些兩足亦漸鬆動初八日服原方太平初十日原方連服五劑兩手肩臂指自能上下伸縮自如兩足能反側惟左腿彎痛些十一日前方連服六劑兩手肩臂指節自能伸縮上下自如惟兩腿膝彎痛雖能反側仍未能如右手大拇指中指至夜半其筋總有些不便至早起始能自如似乎痹痛又竄至下部矣十二日經言白虎歷節風證諸肢節腫疼如虎咬者載在中風門內唐後各大家議論中風大法有四其四曰風痹類中風狀故名之也然雖相類實不相同而致痹之由曰風曰寒曰濕互相雜合非可分屬痹者氣閉塞不流通也或痛癢或麻痹或手足緩弱與痿相類但痿因血虛火盛肺焦而成痹因風寒濕氣侵入而成又痹為中風之一但純乎中風則陽受之痹兼風寒濕三氣則陰受之所以為病便重其患不易除也經既言以寒氣勝者為痹痛又言凡傷於寒者皆為熱病觀古人之用藥自有一定之權衡如仲景用附子烏頭必用於表散藥中合桂枝麻黃等藥同用既發表不遠熱之義至攻裡必遵內經不遠於寒可知矣奈何人有未過此義者今痹證兩肩臂手指均能伸縮上下自如惟右手大指中指之筋似乎夜間總有些須不舒下部雖能反側而左腿膝彎筋痛按右手大指中指均起病之根基也遍查痹證又必以舒筋為主仿羚羊角散以治筋似乎有合經意羚羊片一錢五分川芎一錢五分白芍一錢當歸二錢黃耆二錢附子五分防風六分獨活一錢桃仁四分牛膝一錢黃柏一錢生薑二錢苡米五錢煎湯代水十三日原方加杜仲白朮葳靈仙桂枝等味十四日查手陽明之筋起於手大指次指之端結於腕上循臂結於肘足陽明之筋起於中二指結於跗內經曰宗筋主束骨而利機關也云小便時有些澀痛是膀胱之氣不化其右手大指中二指筋攣節痛渾身上下痛處均松獨左腿彎筋痛不減況病久氣分已虛不能不先固正氣以通膀胱是先補而後攻之法也潞黨參一錢五分白朮三錢木通二錢杜仲三錢白茯苓三錢川續斷三錢陳皮五分獨活一錢五分炙草五分甜枸杞一錢蠶沙五錢煎湯代水十五日服原方十六日小便通暢惟右手三指及左腿彎之筋入陰分則腫痛些至陽分則松經言風淫未疾痹在手足四肢為諸陽之本本根之地陽氣先已不用況周身經絡之末乎擬烏頭粥合谷味先從營衛所生之地注力俾四末之陽希圖以漸而充方為病者福兆烏頭研細末生用每用香熟晚米二合入藥末一錢同米煮稀粥不可太稠下生薑汁一匙白蜜三匙攪勻溫啜之為佳如下部濕重加苡米末三錢入粥或將烏頭先用水煮數十沸去水再用渣同米煮亦可十九日原方連服三日上下均見鬆動惟右手大指中二指皆未見大松憶巢氏云夫風者外司厥陰風木與少陽相火同居火發則風生風生必挾木勢侮其脾土故脾氣不行聚液成痰流注四末因成癱瘓余見世人有此患者並未見其能愈一人也仍用仲景烏頭湯服至廿三日已能起床行走右手大指中二指亦能伸屈自如惟入陰分時右手三指總有點不便早起伸縮活動矣二十四日服青州白丸子二十粒生半夏生南星生白附子生烏頭共研細末水浸日日換水甘七日取起為丸如桐子大二月初四日前月二十四日服青州白丸子共十天其為平安近複檢閱各家議論痛痹之證以臂痛不舉敘於半身不遂之下謂風從上入臂先受之世俗謂大指麻者三年後定然中風抑知風善行而數變有熱風寒風之別風之中人必從營衛而入因人之藏府虛實寒熱而變證也內經云脈微而數微者指陽之微數者指風之熾也所出諸脈字字皆本陽虛而言其人必血舍空虛而氣分熱熾風之繇來匪伊朝夕也經又言不問其虛安問其餘偏枯病陽盛陰不足者有之歷節證陽氣痹而不通者尤多前劉李二公之論有攻補之別劉以人稟天賦本無虧欠因邪入攪亂其氣而後成病邪退則正氣自安故以攻邪為要李以人之真氣營養百骸周於性命凡真氣失調少有所虧則五邪六淫乘間而入正復則邪自卻故以補正為要二公深得上古聖賢立方之奧妙明理識證著書各成名手蓋遵古人之規矩對證用藥當補當攻調治得宜自然有效予用攻衝之法雖然僥倖獲效亦是二少奶奶之洪福也現痹痛已愈行走如常而右手大拇指中二指之病恐不易盡除以後能於調養真氣銷去病根則大妙矣餘年屆八旬自問見識短淺恐不能勝任或再遍訪高明治之余之幸也光緒十八年二月瀨江沈青芝記
